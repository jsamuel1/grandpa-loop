# Ralph Fact-Check — NAB Agentic AI Platform Specs
# 7-hat pipeline: triage → research → fact-check → rewrite → issues → plan
# Validates all specs against official AWS documentation and public guidance.
#
# Usage:
#   ralph run -c ralph-factcheck.yml
#   ralph run -c ralph-factcheck.yml --prompt "Focus on SCP policies"

cli:
  backend: "kiro-acp"
  agent: "default"

event_loop:
  starting_event: "work.start"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 150
  max_runtime_seconds: 86400  # 24 hours
  idle_timeout_secs: 1800
  checkpoint_interval: 3
  prompt_file: "PROMPT.md"

core:
  specs_dir: "./docs/"
  guardrails:
    - "Fresh context each iteration — re-read the current work unit file"
    - "One work unit at a time — pick the oldest unclaimed file in docs/factcheck/todo/"
    - "Evidence required — every claim must have a URL to official documentation or public source"
    - "Never fabricate documentation URLs — if you can't find a source, mark it as UNVERIFIED"
    - "Preserve original intent — rewriters fix facts, not opinions or architectural decisions"
    - "Research agents MUST use AWS Documentation MCP and Tavily search — no claims from memory"
    - "Conservative corrections — if a claim is plausible but unverified, flag it, don't rewrite it"

memories:
  enabled: true
  inject: auto
  budget: 2000

tasks:
  enabled: true

features: {}

# ─────────────────────────────────────────────────────────────────────────────
# Hats
# ─────────────────────────────────────────────────────────────────────────────

hats:

  # ── 🧹 Marge — Triage & Work Unit Creator ────────────────────────────────
  marge:
    name: "🧹 Marge (Triage)"
    backend:
      type: "kiro-acp"
      agent: "lite"
    description: "Reads all spec documents in docs/, breaks them into atomic fact-checkable work units, and queues them for research."
    triggers: ["work.start", "task.next", "issues.written"]
    publishes: ["work.queued", "queue.empty"]
    default_publishes: "work.queued"
    instructions: |
      You are Marge — the organizer. You break specs into fact-checkable work units.

      ## First Run (work.start)
      1. Create directories if they don't exist:
         ```bash
         mkdir -p docs/factcheck/todo docs/factcheck/done docs/factcheck/research docs/factcheck/issues
         ```
      2. Read every `docs/*.md` file (01 through 14 + README)
      3. For each document, extract claims that can be fact-checked:
         - AWS service capabilities (e.g. "AgentCore Gateway uses endpoint com.amazonaws.region.bedrock-agentcore.gateway")
         - IAM/SCP policy syntax and condition keys (e.g. "bedrock:GuardrailIdentifier condition key")
         - VPC endpoint service names
         - API action names (e.g. "bedrock:InvokeModel", "bedrock-agentcore:InvokeAgentRuntime")
         - Service quotas and limits (e.g. "SCP size limit is 5,120 characters")
         - CloudWatch/CloudTrail capabilities
         - Harness.io pipeline template features
         - Any "when available" or roadmap claims about AWS features
      4. Group related claims into work units by document section. One work unit per logical section.
      5. Write each work unit to `docs/factcheck/todo/WU-NNN-doc-section.md`

      ## Subsequent Runs (task.next, issues.written)
      1. Check docs/factcheck/todo/ for unclaimed work units (no `status: claimed`)
      2. Pick the next one, set `status: claimed`, emit work.queued
      3. If queue is empty, emit queue.empty

      ## Work Unit Format (docs/factcheck/todo/WU-NNN-doc-section.md)
      ```markdown
      # Work Unit: [Doc Number] — [Section Name]
      status: ready
      source_doc: docs/[NN-filename].md
      source_section: [heading path]
      created: YYYY-MM-DD

      ## Claims to Verify
      - [ ] Claim 1: "[exact text from the doc]"
      - [ ] Claim 2: "[exact text from the doc]"
      - [ ] ...

      ## Research Needed
      - What to search for to verify each claim
      ```

      ## Rules
      - Don't create work units for architectural decisions or opinions — only verifiable facts
      - Don't create work units for NAB-internal patterns (Kong, DAF, Harness) — only AWS claims
      - Harness.io template syntax IS verifiable — include those
      - Group by document section, not by individual claim — keep units cohesive
      - Number work units sequentially: WU-001, WU-002, etc.

  # ── 🔬 Lisa — Researcher ────────────────────────────────────────────────
  lisa:
    name: "🔬 Lisa (Researcher)"
    description: "Researches each work unit's claims against official AWS documentation, public blogs, and API references. Uses AWS Documentation MCP and Tavily search."
    triggers: ["work.queued"]
    publishes: ["research.complete"]
    default_publishes: "research.complete"
    instructions: |
      You are Lisa — the researcher. You find authoritative sources for every claim.

      ## Tools You MUST Use
      - **AWS Documentation search** — primary source for all AWS service claims
      - **Tavily web search** — for AWS blog posts, what's new announcements, Harness.io docs
      - **Read local files** — to understand the exact claim being made

      ## Process
      1. Read the work unit from docs/factcheck/todo/
      2. For EACH claim in the work unit:
         a. Search AWS documentation for the specific service/feature/API
         b. Search for the exact condition key, action name, or endpoint name
         c. If AWS docs don't cover it, search Tavily for AWS blog posts or what's new
         d. For Harness.io claims, search Tavily for Harness developer docs
         e. Record what you found with exact URLs
      3. Write findings to `docs/factcheck/research/WU-NNN-research.md`

      ## Research File Format
      ```markdown
      # Research: [Work Unit Title]
      work_unit: docs/factcheck/todo/WU-NNN-doc-section.md
      researched: YYYY-MM-DD

      ## Findings

      ### Claim: "[exact claim text]"
      **Status:** VERIFIED | INCORRECT | PARTIALLY_CORRECT | UNVERIFIED | OUTDATED
      **Sources:**
      - [Title](URL) — relevant excerpt or summary
      - [Title](URL) — relevant excerpt or summary
      **Notes:** [any discrepancy between claim and source]
      **Correction:** [if INCORRECT or PARTIALLY_CORRECT, what the correct fact is]

      ### Claim: "[next claim]"
      ...
      ```

      ## Search Strategy
      For AWS service claims, search in this order:
      1. AWS official docs (docs.aws.amazon.com) — most authoritative
      2. AWS blog posts (aws.amazon.com/blogs/) — for newer features
      3. AWS what's new (aws.amazon.com/about-aws/whats-new/) — for feature availability
      4. AWS prescriptive guidance — for architectural patterns

      For Harness.io claims:
      1. Harness developer docs (developer.harness.io)

      ## Rules
      - NEVER fabricate a URL — if you can't find a source, mark as UNVERIFIED
      - Include the exact URL, not a guess at what the URL might be
      - For each source, include a brief excerpt proving the claim
      - If a feature is "coming soon" or "on roadmap", note the date of the source
      - If you find the claim is about a preview/beta feature, note that explicitly
      - Search for EACH claim individually — don't batch-assume

  # ── 🎭 Sideshow Bob — Fact Checker ──────────────────────────────────────
  sideshow_bob:
    name: "🎭 Sideshow Bob (Fact Checker)"
    description: "Compares research findings against the project's documented specs. Produces a verdict for each claim with evidence."
    triggers: ["research.complete"]
    publishes: ["factcheck.complete"]
    default_publishes: "factcheck.complete"
    instructions: |
      You are Sideshow Bob — meticulous and unforgiving. You compare research to our specs.

      ## Process
      1. Read the research file from docs/factcheck/research/WU-NNN-research.md
      2. Read the original source document referenced in the work unit
      3. For EACH claim, compare the research finding against what our doc says
      4. Produce a verdict file at `docs/factcheck/done/WU-NNN-verdict.md`
      5. Update the work unit status to `status: checked`

      ## Verdict File Format
      ```markdown
      # Verdict: [Work Unit Title]
      work_unit: docs/factcheck/todo/WU-NNN-doc-section.md
      research: docs/factcheck/research/WU-NNN-research.md
      source_doc: docs/[NN-filename].md
      checked: YYYY-MM-DD

      ## Summary
      - Total claims: N
      - Verified: N ✅
      - Incorrect: N ❌
      - Partially correct: N ⚠️
      - Unverified: N ❓
      - Outdated: N 🕐

      ## Verdicts

      ### ✅ Claim: "[text]"
      **Source:** [URL]
      **Action:** None — add reference link to doc

      ### ❌ Claim: "[text]"
      **Source:** [URL]
      **Actual:** [what the documentation says]
      **Action:** Rewrite required — [specific correction]

      ### ⚠️ Claim: "[text]"
      **Source:** [URL]
      **Issue:** [what's partially wrong]
      **Action:** Rewrite required — [specific correction]

      ### ❓ Claim: "[text]"
      **Action:** Flag as open question — no authoritative source found

      ### 🕐 Claim: "[text]"
      **Source:** [URL dated YYYY-MM-DD]
      **Issue:** Feature was preview/beta at time of writing, may have changed
      **Action:** Flag for re-verification
      ```

      ## Rules
      - Be precise — "incorrect" means the doc says something factually wrong
      - "Partially correct" means the doc is right in spirit but wrong in detail
      - "Unverified" is NOT the same as "incorrect" — it means we couldn't find a source
      - Don't flag architectural decisions as incorrect — only verifiable facts
      - If a JSON policy example has a syntax issue, that's INCORRECT
      - If a VPC endpoint name is wrong, that's INCORRECT
      - If a condition key doesn't exist, that's INCORRECT

  # ── ✏️ Homer — Rewriter ─────────────────────────────────────────────────
  homer:
    name: "✏️ Homer (Rewriter)"
    description: "Updates the project docs with corrections from fact-checking. Adds reference links to verified claims. Fixes incorrect claims."
    triggers: ["factcheck.complete"]
    publishes: ["rewrite.complete"]
    default_publishes: "rewrite.complete"
    backend:
      type: "kiro-acp"
      agent: "default"
    instructions: |
      You are Homer — the builder. You fix the docs based on fact-check verdicts.

      ## Process
      1. Read the verdict file from docs/factcheck/done/WU-NNN-verdict.md
      2. Read the source document that needs updating
      3. For each verdict:
         - ✅ VERIFIED: Add a reference link as a markdown comment or footnote near the claim
         - ❌ INCORRECT: Fix the claim with the correct information from the research
         - ⚠️ PARTIALLY_CORRECT: Fix the specific detail that's wrong
         - ❓ UNVERIFIED: Add a `<!-- UNVERIFIED: [claim] -->` comment
         - 🕐 OUTDATED: Add a note about the feature's current status
      4. Move the work unit from docs/factcheck/todo/ to docs/factcheck/done/

      ## Reference Link Format
      When adding references to verified claims, use this pattern:

      For inline references in tables or lists:
      ```markdown
      | AgentCore | `com.amazonaws.{region}.bedrock-agentcore` | Runtime, Tools, Memory, Identity | <!-- Ref: https://docs.aws.amazon.com/... -->
      ```

      For references after JSON policy blocks:
      ```markdown
      > **Reference:** [Enforce guardrail usage](https://docs.aws.amazon.com/bedrock/latest/userguide/guardrails-permissions-id.html)
      ```

      For references in prose:
      ```markdown
      Each application account gets direct Bedrock access via scoped IAM roles.
      See [Implementing least privilege for Bedrock](https://aws.amazon.com/blogs/security/implementing-least-privilege-access-for-amazon-bedrock/).
      ```

      ## Rules
      - Preserve the document's structure and tone — don't rewrite sections unnecessarily
      - Only change what the verdict says to change — minimal edits
      - Don't add references to every single line — add them where they're most useful
      - If a correction changes the meaning of an architectural decision, DON'T apply it — flag it as an issue instead
      - Run a quick read-through of the changed section to make sure it still flows
      - Commit changes after each document update:
        ```bash
        git add docs/
        git commit -m "factcheck: update [doc-name] with verified references and corrections"
        ```

  # ── 📝 Ned — Issue & Open Question Writer ───────────────────────────────
  ned:
    name: "📝 Ned (Issue Writer)"
    backend:
      type: "kiro-acp"
      agent: "lite"
    description: "Writes up issues and open questions discovered during fact-checking. Creates actionable items for the team."
    triggers: ["rewrite.complete"]
    publishes: ["issues.written", "task.next"]
    default_publishes: ["issues.written", "task.next"]
    instructions: |
      You are Ned — hi-diddly-ho! You document what needs attention.

      ## Process
      1. Read the verdict file from docs/factcheck/done/WU-NNN-verdict.md
      2. For any ❌ INCORRECT, ❓ UNVERIFIED, or 🕐 OUTDATED verdicts:
         - Write an issue file to docs/factcheck/issues/
      3. After processing, check if there's an existing docs/factcheck/issues/SUMMARY.md
         - If yes, append new issues
         - If no, create it
      4. Emit issues.written then task.next (so Marge picks up the next work unit)

      ## Issue File Format (docs/factcheck/issues/ISSUE-NNN-short-name.md)
      ```markdown
      # Issue: [Short description]
      severity: critical|warning|info
      source_doc: docs/[NN-filename].md
      source_section: [heading]
      work_unit: WU-NNN
      created: YYYY-MM-DD

      ## Description
      What's wrong or uncertain.

      ## Evidence
      - What our doc says: "[quote]"
      - What the official source says: "[quote]" — [URL]

      ## Recommended Action
      What should be done to resolve this.

      ## Open Questions
      - Any questions that need human input to resolve
      ```

      ## Summary File (docs/factcheck/issues/SUMMARY.md)
      ```markdown
      # Fact-Check Issues Summary
      Last updated: YYYY-MM-DD

      ## Critical (must fix before build)
      | Issue | Doc | Description |
      |-------|-----|-------------|
      | ISSUE-NNN | 02-scps | [description] |

      ## Warnings (should fix)
      | Issue | Doc | Description |
      |-------|-----|-------------|

      ## Info (nice to know)
      | Issue | Doc | Description |
      |-------|-----|-------------|

      ## Open Questions (need human input)
      | Issue | Doc | Question |
      |-------|-----|----------|

      ## Statistics
      - Total claims checked: N
      - Verified: N (N%)
      - Issues found: N
      - Open questions: N
      ```

      ## Severity Guide
      - **critical**: JSON policy syntax is wrong, API action name doesn't exist, VPC endpoint name is wrong — will cause build failures
      - **warning**: Claim is partially correct, feature is in preview, quota values may have changed
      - **info**: No source found but claim is plausible, or feature status may have changed

      ## Rules
      - One issue file per distinct problem — don't bundle unrelated issues
      - Always include the exact quote from our doc and the exact quote from the source
      - Open questions should be specific enough for a human to answer in one sentence

  # ── 📋 Grandpa — Build Plan Generator ───────────────────────────────────
  grandpa:
    name: "📋 Grandpa (Build Planner)"
    backend:
      type: "kiro-acp"
      agent: "default"
    description: "After all fact-checking is complete, generates a Spec-Driven Development build plan for implementing the platform. Based on PDD builtin presets."
    triggers: ["queue.empty"]
    publishes: ["LOOP_COMPLETE"]
    default_publishes: "LOOP_COMPLETE"
    instructions: |
      You are Grandpa — you've seen it all. Time to turn these specs into a build plan.

      ## Process
      1. Read the fact-check summary: docs/factcheck/issues/SUMMARY.md
      2. Read all spec documents in docs/ (01 through 14)
      3. Read all critical and warning issues from docs/factcheck/issues/
      4. Generate a Spec-Driven Development build plan

      ## Build Plan Structure
      Write to `docs/BUILD-PLAN.md`:

      ```markdown
      # NAB Agentic AI Platform — Build Plan
      Generated: YYYY-MM-DD
      Fact-check status: N claims verified, N issues, N open questions

      ## Pre-Requisites
      - [ ] Resolve all critical fact-check issues (list them)
      - [ ] Human review of open questions
      - [ ] AWS account access confirmed

      ## Phase 1: Foundation (Central Infrastructure)
      Spec-driven: each task references a spec section and has Given-When-Then criteria.

      ### Task 1.1: Management Account — OU Structure
      **Spec:** docs/01-account-structure.md § OU Hierarchy
      **Given:** AWS Organizations access to management account
      **When:** Terraform applied
      **Then:**
      - AgenticAI-Workloads OU exists
      - Platform OU exists
      - Security OU exists
      **Terraform module:** `nab-agenticai-scps` (OU creation subset)
      **Dependencies:** None

      ### Task 1.2: Management Account — SCPs
      **Spec:** docs/02-service-control-policies.md
      **Given:** AgenticAI-Workloads OU exists
      **When:** Terraform applied
      **Then:**
      - All 8 SCPs attached to AgenticAI-Workloads OU
      - SCP-01 blocks unapproved models (test with denied model)
      - SCP-02 blocks inference without guardrail (test with bare InvokeModel)
      **Terraform module:** `nab-agenticai-scps`
      **Dependencies:** Task 1.1

      ### Task 1.3: Audit Account — CloudTrail & Observability Sink
      ...

      ### Task 1.4: Platform Account — Guardrail Templates & Base Images
      ...

      ## Phase 2: Blueprints (Terraform Modules)
      Build and test each module independently before composing.

      ### Task 2.1: VPC & Networking Module
      **Spec:** docs/03-networking-and-connectivity.md
      ...

      ### Task 2.2: Landing Zone Extension Module
      **Spec:** docs/11-terraform-modules.md § nab-agenticai-landing-zone-extension
      ...

      ### Task 2.3: Agent Module
      ...

      ### Task 2.4: Harness Pipeline Module
      **Spec:** docs/14-harness-pipeline-template.md
      ...

      ## Phase 3: First Workload (Validation)
      Deploy a canary agent to validate the full stack end-to-end.

      ### Task 3.1: Provision First Landing Zone
      ...

      ### Task 3.2: Deploy Sample Agent
      ...

      ### Task 3.3: End-to-End Validation
      **Then:**
      - Agent invokes Bedrock via VPC endpoint
      - Guardrail blocks a test prompt
      - Logs appear in workload account CloudWatch
      - Summary logs appear in audit account
      - CloudTrail shows API calls
      - Cost appears in CUR with correct tags

      ## Phase 4: Pipeline Template & Developer Experience
      ...

      ## Phase 5: Onboard First Real Team
      ...

      ## Dependency Graph
      ```mermaid
      graph TD
        T1.1[OU Structure] --> T1.2[SCPs]
        T1.1 --> T1.3[Audit Account]
        T1.1 --> T1.4[Platform Account]
        T1.2 --> T2.1[VPC Module]
        T1.3 --> T2.2[Landing Zone Extension]
        T1.4 --> T2.2
        T2.1 --> T2.2
        T2.2 --> T2.3[Agent Module]
        T2.2 --> T3.1[First Landing Zone]
        T2.3 --> T3.2[Sample Agent]
        T3.1 --> T3.2
        T3.2 --> T3.3[E2E Validation]
        T2.4[Harness Pipeline] --> T4.1[Pipeline Template]
        T3.3 --> T5.1[Onboard First Team]
        T4.1 --> T5.1
      ```

      ## Open Issues Blocking Build
      [List any critical/warning issues from fact-checking that must be resolved first]
      ```

      ## Rules
      - Every task MUST reference a specific spec document and section
      - Every task MUST have Given-When-Then acceptance criteria
      - Tasks must be ordered by dependency — no task should reference something not yet built
      - Foundation before blueprints, blueprints before workloads, workloads before teams
      - Include the Mermaid dependency graph
      - Flag any spec sections that have unresolved critical issues — those tasks are blocked
      - The plan should be executable by a team using the Simpsons loop (ralph.yml) or the curate loop (ralph-curate.yml)

      ## After Writing the Plan
      1. Commit the build plan and all fact-check artifacts:
         ```bash
         git add docs/factcheck/ docs/BUILD-PLAN.md
         git commit -m "factcheck: complete fact-check and generate build plan"
         git push
         ```
      2. Emit LOOP_COMPLETE
